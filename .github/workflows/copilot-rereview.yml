name: Copilot re-review

# GitHub's built-in "automatically request Copilot review" lives in a repository
# *ruleset*, which is gated behind plan tiers (e.g. GitHub Pro on a private repo;
# a Copilot subscription alone is not enough). This workflow reproduces the part
# we care about — re-review on new commits — for free, using only the default
# token's pull-requests:write permission.
#
# The first review stays a manual opt-in: request Copilot once on a PR, and
# every push after that re-requests it automatically so the review reflects the
# latest code. PRs Copilot has never reviewed are left untouched.

on:
  pull_request:
    types: [synchronize]

permissions:
  pull-requests: write

# Coalesce rapid pushes to the same PR so we don't queue redundant re-requests.
concurrency:
  group: copilot-rereview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  rerequest:
    # Fork PRs run with a read-only GITHUB_TOKEN that can't modify the base repo,
    # so requesting a reviewer would fail. Skip them to avoid noisy red runs.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Re-request Copilot if it already reviewed this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.number }}
          BOT: copilot-pull-request-reviewer[bot]
        run: |
          # --paginate walks every page; the default 30-per-page would miss a
          # prior review once a PR accumulates more than 30 reviews.
          if gh api --paginate "repos/$REPO/pulls/$PR/reviews" \
               --jq '.[].user.login' | grep -Fxq "$BOT"; then
            echo "Copilot has reviewed this PR before — re-requesting for the new commits."
            # If Copilot is still a pending requested reviewer, the API returns 422;
            # tolerate that so repeated pushes don't turn the workflow red.
            if ! gh api -X POST "repos/$REPO/pulls/$PR/requested_reviewers" \
                   -f 'reviewers[]=copilot-pull-request-reviewer[bot]'; then
              echo "Re-request was rejected (Copilot is likely already requested) — ignoring."
            fi
          else
            echo "Copilot has not reviewed this PR — skipping (manual opt-in preserved)."
          fi
